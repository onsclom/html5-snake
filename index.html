<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="snake.mjs"></script>
    <title>snake</title>
    <style>
      html,
      body {
        width: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        text-align: center;
        max-width: 40rem;
        margin: auto;
      }
      canvas {
        width: 100%;
        display: block;
        margin: auto;
        max-width: 400px;
        max-height: 400px;
        /* this stuff to remove gross automatic filtering for scaled canvas */
        image-rendering: -moz-crisp-edges;
        image-rendering: -webkit-crisp-edges;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <h1>snake</h1>
    <canvas width="20" height="20" id="gameCanvas"></canvas>
    <p>score: <span id="score">0</span></p>
    <p id="instructionText">arrow keys to move</p>
  </body>
</html>
